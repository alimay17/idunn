<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/main.css">
  <title>My Heroes</title>
</head>

<body>
  <header>
    <h1>My Heroes</h1>
    <a class="button" href="week03.html">Back</a>
  </header>
  <section>
    <h2>Hero Display</h2>
    <p>Study for your next Super Heroes Quiz!</p>
    <div class="controls">
      <button id="toggle">Display On/Off</button>
      <button id="sort1">Sort by Alias Alphabetically</button>
      <button id="sort2">Sort by Last Name Alphabetically</button>
    </div>
    <ul id="heroDisplay"></ul>
  </section>
  <section id="results">
    <h2>Hero Quiz</h2>
    <p>Take the Quiz</p>
    <div class="controls">
      <button id="quiz">Take Quiz!!</button>
      <button id="scoreButton">See my Score</button>
      <button id="reset">Reset Scores</button>
    </div>
    <div id="result"></div>
    <div id="info"></div>
  </section>
  <footer>
    <p>&copy; Alice Smith - Jan 2022 | WDD 330 : Bro. Baer | <a href="https://github.com/alimay17/idunn">Source code on Github</a></p>
  </footer>
  <script src="js/main.js" type="module"></script>
</body>

</html>
